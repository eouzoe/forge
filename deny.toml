# deny.toml — Forge supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Check all crates (workspace + transitive) for unmaintained status
# In cargo-deny 0.16+: vulnerability/unsound/notice fields removed (always deny)
unmaintained = "all"
# Deny yanked crates (explicitly withdrawn by author)
yanked = "deny"

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "Unlicense",
  "BSL-1.0",
]
# Confidence threshold for license detection heuristics
confidence-threshold = 0.8

[[licenses.clarify]]
# android_system_properties, serde_urlencoded, version_check use old SPDX slash format
# MIT/Apache-2.0 is equivalent to MIT OR Apache-2.0
name = "android_system_properties"
version = "*"
expression = "MIT OR Apache-2.0"
license-files = [
  { path = "LICENSE-APACHE", hash = 0x001c7e6c },
  { path = "LICENSE-MIT", hash = 0xc8e04f75 },
]

[[licenses.clarify]]
name = "serde_urlencoded"
version = "*"
expression = "MIT OR Apache-2.0"
license-files = [
  { path = "LICENSE-APACHE", hash = 0x001c7e6c },
  { path = "LICENSE-MIT", hash = 0xc8e04f75 },
]

[[licenses.clarify]]
name = "version_check"
version = "*"
expression = "MIT OR Apache-2.0"
license-files = [
  { path = "LICENSE-APACHE", hash = 0x001c7e6c },
  { path = "LICENSE-MIT", hash = 0xc8e04f75 },
]

[bans]
# Warn on multiple versions of the same crate (expected in complex workspaces)
multiple-versions = "warn"
# Deny wildcard dependencies (pinning required)
wildcards = "deny"
# Allow path-based internal workspace dependencies without pinned versions
allow-wildcard-paths = true
# Allow workspace crates to depend on path dependencies without version
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
