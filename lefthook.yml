# lefthook.yml — Forge git hooks
# Install: nix run nixpkgs#lefthook -- install

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.rs"
      run: cargo fmt --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace -- -D warnings
    toml-check:
      glob: "*.toml"
      run: taplo fmt --check
    typos:
      run: typos

commit-msg:
  commands:
    conventional:
      run: |
        MSG=$(head -1 {1})
        if ! echo "$MSG" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci)\(.+\): .+'; then
          echo "Commit message must follow conventional commits format:"
          echo "  <type>(<scope>): <subject>"
          echo ""
          echo "  Types: feat, fix, docs, style, refactor, perf, test, chore, ci"
          echo "  Example: feat(gateway): add sandbox pool"
          exit 1
        fi

pre-push:
  commands:
    test:
      run: cargo test --workspace
    deny:
      run: cargo deny check
